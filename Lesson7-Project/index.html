<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aside</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <aside class="sidebar__main">
      <header class="header">
        <div class="header__left">
          <button class="btn header__btn header__btn--close" type="button">
            <img src="./assets/img/close.svg" alt="close" />
          </button>
          <div class="header__image--cps">
            <img src="./assets/img/cps.svg" alt="CPS logo" />
          </div>
        </div>
        <button class="btn header__btn header__button--search" type="button">
          <img src="./assets/img/search.svg" alt="Search btn" />
        </button>
      </header>
      <nav class="nav__section">
        <ul class="nav__list">
          <li class="nav__item nav__item--active">
            <a href="#">Ремонт техники</a>
          </li>
          <li class="nav__item"><a href="#">Услуги и сервисы</a></li>
          <li class="nav__item"><a href="#">Корпоративным клиентам</a></li>
          <li class="nav__item"><a href="#">Продавцам техники</a></li>
          <li class="nav__item"><a href="#">Партнерам</a></li>
          <li class="nav__item"><a href="#">Производителям</a></li>
          <li class="nav__item"><a href="#">Наши сервисные центры</a></li>
          <li class="nav__item"><a href="#">Контакты</a></li>
        </ul>
      </nav>
      <footer>
        <div class="contacts">
          <div class="contacts__btn">
            <button class="btn contacts__call" type="button">
              <img src="./assets/img/phone.svg" alt="call" />
            </button>
            <button class="btn contacts__message" type="button">
              <img src="./assets/img/text.svg" alt="text" />
            </button>
            <button class="btn contacts__profile" type="button">
              <img src="./assets/img/profile.svg" alt="profile" />
            </button>
          </div>
          <div class="contacts-click">
            <a class="contacts-click__mail" href="mailto:mail@cps.com">
              mail@cps.com
            </a>
            <a class="contacts-click__tel-number" href="tel:88008908900">
              8 800 890 8900
            </a>
          </div>
          <div class="lang__container">
            <button class="btn lang__btn lang__ru" type="button">RU</button>
            <button class="btn lang__btn lang__en" type="button">EN</button>
            <button class="btn lang__btn lang__ch" type="button">CH</button>
          </div>
        </div>
      </footer>
    </aside>
  </body>
</html>
