<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aside</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <aside class="sidebar__main">
      <header class="header">
        <button class="btn header__btn header__btn--close" type="button">
          <img src="close.svg" alt="close" />
        </button>
        <div class="header__image--cps">
          <img src="cps.svg" alt="CPS logo" />
        </div>
        <button class="btn header__btn header__button--search" type="button">
          <img src="search.svg" alt="Search btn" />
        </button>
      </header>
      <nav class="nav__section">
        <ul class="nav__list">
          <li class="nav__item nav__item--active">
            <a href="#">Ремонт техники</a>
          </li>
          <li class="nav__item"><a href="#">Услуги и сервисы</a></li>
          <li class="nav__item"><a href="#">Корпоративным клиентам</a></li>
          <li class="nav__item"><a href="#">Продавцам техники</a></li>
          <li class="nav__item"><a href="#">Партнерам</a></li>
          <li class="nav__item"><a href="#">Производителям</a></li>
          <li class="nav__item"><a href="#">Наши сервисные центры</a></li>
          <li class="nav__item"><a href="#">Контакты</a></li>
        </ul>
      </nav>
      <footer>
        <div class="contacts">
          <div class="contacts__btn">
            <button
              class="btn contacts__btn--footer contacts__btn--call"
              type="button"
            >
              <img src="phone.svg" alt="call" />
            </button>
            <button
              class="btn contacts__btn--footer contacts__btn--message"
              type="button"
            >
              <img src="text.svg" alt="text" />
            </button>
            <button
              class="btn contacts__btn--footer contacts__btn--profile"
              type="button"
            >
              <img src="profile.svg" alt="" />
            </button>
          </div>
          <div class="contacts__onclick--container">
            <a
              class="contacts__onclick contacts__onclick--mail"
              href="mailto:mail@cps.com"
            >
              mail@cps.com
            </a>
            <a
              class="contacts__onclick contacts__onclick--tel"
              href="tel:88008908900"
            >
              8 800 890 8900
            </a>
          </div>
          <div class="lang__container">
            <button class="btn lang__btn lang__ru" type="button">RU</button>
            <button class="btn lang__btn lang__en" type="button">EN</button>
            <button class="btn lang__btn lang__ch" type="button">CH</button>
          </div>
        </div>
      </footer>
    </aside>
  </body>
</html>
