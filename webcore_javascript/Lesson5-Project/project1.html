<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Регистрация iintoo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main-wrapper">
      <div class="left-side">
        <div class="image-container">
          <img src="bg.jpg" alt="Background" class="blue-img" />
          <img src="logo.svg" s alt="iintoo logo" class="logo" />
        </div>
      </div>

      <div class="right-side">
        <h1 class="main-title">Get iintoo it today</h1>
        <p class="desc">There is no charge or obligation upon registration.</p>

        <div class="social-block">
          <div class="social-media">
            <button class="social-btn facebook-btn">
              <img src="facebook.svg" alt="FB" class="btn-icon" />
              <span>Register with Facebook</span>
            </button>
            <button class="social-btn linkedin-btn">
              <img src="linkedin.svg" alt="LinkedIn" class="btn-icon" />
              <span>Register with LinkedIn</span>
            </button>
          </div>

          <div class="separator">OR</div>
        </div>

        <div class="input-row">
          <div class="input-box">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              placeholder="gus.goodwin@gmail.com"
            />
          </div>
          <div class="input-box">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" placeholder="" />
          </div>
        </div>

        <div class="hint-box">
          <h2 class="sub-title">What type of investor are you?</h2>
          <p class="sub-desc">Select the type of investor you are below.</p>

          <div class="radio-buttons">
            <label>
              <input type="radio" name="investor" checked />
              Individual
              <span
                class="tooltip"
                data-tooltip="A natural person investing on their own behalf as a sole owner, joint tenant, or tenant in common."
                >i</span
              >
            </label>
            <label>
              <input type="radio" name="investor" />
              Business
              <span
                class="tooltip"
                data-tooltip="A natural person investing on their own behalf as a sole owner, joint tenant, or tenant in common."
                >i</span
              >
            </label>
            <label>
              <input type="radio" name="investor" />
              IRA
              <span
                class="tooltip"
                data-tooltip="A natural person investing on their own behalf as a sole owner, joint tenant, or tenant in common."
                >i</span
              >
            </label>
            <label>
              <input type="radio" name="investor" />
              Trust
              <span
                class="tooltip"
                data-tooltip="A natural person investing on their own behalf as a sole owner, joint tenant, or tenant in common."
                >i</span
              >
            </label>
          </div>
        </div>

        <div class="check-row">
          <input type="checkbox" id="terms" />
          <label for="terms">
            I agree to the terms and receiving notifications from iintoo
            <a href="#">View full terms</a>
          </label>
        </div>

        <button type="submit" class="submit-btn">Create Account</button>
      </div>
    </div>
  </body>
</html>
