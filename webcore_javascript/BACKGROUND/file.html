<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Background</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <section class="bg-section">
        <h2 class="bg-section__title">1. Background color</h2>
        <div class="example-row">
          <div class="example-box color">Color</div>
          <div class="example-box rgba">Color RGBA</div>
        </div>
      </section>

      <section class="bg-section">
        <h2 class="bg-section__title">1. Background image</h2>
        <div class="example-row">
          <div class="repeated">Repeated</div>
          <div class="cover">Cover</div>
          <div class="contain">Contain</div>
        </div>
      </section>

      <section class="bg-section">
        <h2 class="bg-section__title">1. Background position</h2>
        <div class="example-row">
          <div class="center">Center</div>
          <div class="left">Left</div>
          <div class="right">Right</div>
        </div>
      </section>

      <section class="bg-section">
        <h2 class="bg-section__title">1. Background gradient</h2>
        <div class="example-row">
          <div class="linear">Linear</div>
          <div class="radial">Radial</div>
          <div class="conic">Conic</div>
        </div>
      </section>
    </div>
  </body>
</html>
