    <main>
    <h2>Forms and samentic html</h2>
    <form action="https://google.com/search" method="GET">
    <p>
      <label for="search"> Search Google</label>
      <input type=" text" id="search" name="q" placeholder="Search Google" required>
    </p>
    <p>
      <button type="submit">Search</button>
    </p>

    <div>
      <form >
        <p>
          <label for="name">Name</label>
          <input type="text" id = "name" name = "name"
          placeholder="Enter your name" required>
        </p>
     </div>
    <div>
      <p>
        <label for="email">Email</label>
        <input type="email" name="email"
        placeholder="Enter your email" required>
      </p>
    </div>

    <div>
      <p>
        <label for="password"></label>
        <input type="password" name="password" 
        placeholder="password" required>
      </p>
    </div>

    <div>
      <p>
        <button type="submit">Submit</button>
      </p>
    </div>

    <form>
      <p>
        <input type="radio" name="options" id="blue" checked>
        <label for="blue">Blue</label>
      </p>

      <p>
        <input type="radio" name="options" id="red" checked>
        <label for="red">Red</label>
      </p>

    </form>
